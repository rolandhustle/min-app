<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Uppgifter</title>
  <link rel="icon" type="image/png" href="/raven.png">
  <link rel="apple-touch-icon" href="/raven.png">
  <link rel="manifest" href="/manifest.json">
</head>
<body>

<header>
  <img src="/raven.png" alt="Raven">
</header>

<nav>
  <button class="tab-btn active" data-tab="todo">
    Att göra… <span class="count" id="count-todo">0</span>
  </button>
  <button class="tab-btn" data-tab="done">
    Genomfört <span class="count" id="count-done">0</span>
  </button>
  <button class="tab-btn" data-tab="inkop">
    Inköpslista <span class="count" id="count-inkop">0</span>
  </button>
  <button class="tab-btn" data-tab="recept">
    Recept <span class="count" id="count-recept">0</span>
  </button>
</nav>

<main>
  <!-- Tab 1 -->
  <div class="tab-panel active" id="panel-todo">
    <form class="add-form" id="add-form" autocomplete="off">
      <input type="text" id="task-title" placeholder="Lägg till ny uppgift…" required>
      <input type="date" id="task-date">
      <button type="submit">Lägg till</button>
    </form>
    <div class="task-list" id="todo-list"></div>
  </div>

  <!-- Tab 2 -->
  <div class="tab-panel" id="panel-done">
    <div class="task-list" id="done-list"></div>
  </div>

  <!-- Tab 3 -->
  <div class="tab-panel" id="panel-inkop">
    <form class="add-form" id="inkop-form" autocomplete="off">
      <input type="text" id="inkop-input" placeholder="Lägg till vara…" required>
      <button type="submit">Lägg till</button>
    </form>
    <div class="inkop-list" id="inkop-list"></div>
  </div>

  <!-- Tab 4 -->
  <div class="tab-panel" id="panel-recept">
    <form class="add-form" id="recept-form" autocomplete="off">
      <input type="url" id="recept-url" placeholder="Klistra in recept-URL…" required>
      <button type="submit">Hämta</button>
    </form>
    <div id="recept-loading" class="recept-loading recept-hidden">Hämtar recept…</div>
    <div id="recept-detail" class="recept-detail recept-hidden"></div>
    <div class="recept-list" id="recept-list"></div>
  </div>
</main>

<script type="module" src="/src/main.js"></script>
</body>
</html>
