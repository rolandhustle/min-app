<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Uppgifter</title>
  <link rel="icon" type="image/png" href="/raven.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Uppgifter">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
</head>
<body>

<header>
  <img src="/raven.png" alt="Raven">
</header>


<main>
  <!-- Tab 1 -->
  <div class="tab-panel active" id="panel-todo">
    <form class="add-form" id="add-form" autocomplete="off">
      <input type="text" id="task-title" placeholder="Lägg till ny uppgift…" required>
      <input type="date" id="task-date">
      <button type="submit">Lägg till</button>
    </form>
    <div class="task-list" id="todo-list"></div>
  </div>

  <!-- Tab 2 -->
  <div class="tab-panel" id="panel-done">
    <div class="task-list" id="done-list"></div>
  </div>

  <!-- Tab 3 -->
  <div class="tab-panel" id="panel-inkop">
    <form class="add-form" id="inkop-form" autocomplete="off">
      <input type="text" id="inkop-input" placeholder="Lägg till vara…" required>
      <button type="submit">Lägg till</button>
    </form>
    <div class="inkop-list" id="inkop-list"></div>
  </div>

  <!-- Tab 4 -->
  <div class="tab-panel" id="panel-recept">
    <form class="add-form" id="recept-form" autocomplete="off">
      <input type="url" id="recept-url" placeholder="Klistra in recept-URL…" required>
      <button type="submit">Hämta</button>
    </form>
    <div id="recept-loading" class="recept-loading recept-hidden">Hämtar recept…</div>
    <div id="recept-detail" class="recept-detail recept-hidden"></div>
    <div class="recept-list" id="recept-list"></div>
  </div>
</main>

<nav class="bottom-nav">
  <button class="tab-btn active" data-tab="todo">
    <div class="tab-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
      </svg>
      <span class="count" id="count-todo">0</span>
    </div>
    <span class="tab-label">Att göra</span>
  </button>
  <button class="tab-btn" data-tab="done">
    <div class="tab-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      <span class="count" id="count-done">0</span>
    </div>
    <span class="tab-label">Genomfört</span>
  </button>
  <button class="tab-btn" data-tab="inkop">
    <div class="tab-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      <span class="count" id="count-inkop">0</span>
    </div>
    <span class="tab-label">Inköpslista</span>
  </button>
  <button class="tab-btn" data-tab="recept">
    <div class="tab-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
      </svg>
      <span class="count" id="count-recept">0</span>
    </div>
    <span class="tab-label">Recept</span>
  </button>
</nav>

<script type="module" src="/src/main.js"></script>
</body>
</html>
